# Default: Qwen2.5-1.5B-Instruct (better chat quality than 0.5B; ~4–6 GB on disk). First start downloads.
services:
  tinyllm:
    build: .
    ports:
      - "22122:22122"
    environment:
      - MODEL_PATH=/models/model
      - MODEL_REPO=Qwen/Qwen2.5-1.5B-Instruct
      - DATA_DIR=/data
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - TORCH_NUM_THREADS=4
      - TORCH_INTEROP_THREADS=1
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - MAX_PROMPT_CHARS=6000
    volumes:
      - tinyllm_model:/models
      - ./data:/data:ro
    shm_size: 512mb
    restart: unless-stopped
    cpus: 4.0
    mem_limit: 12g

volumes:
  tinyllm_model:
