<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #log { height: min(60vh, 480px); overflow-y: auto; background: #f8f9fa; }
    .msg-user { background: #0d6efd; color: #fff; border-radius: 12px; padding: .5rem .75rem; max-width: 92%; margin-left: auto; }
    .msg-bot { background: #e9ecef; color: #212529; border-radius: 12px; padding: .5rem .75rem; max-width: 92%; }
    .msg-bot .body { white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, Consolas, system-ui, sans-serif; font-size: 0.9rem; }
    .msg-meta { font-size: .75rem; color: #6c757d; }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width: 720px;">
    <h1 class="h4 mb-1">Local chat</h1>
    <p class="text-muted small mb-2">Uses <strong>/v1/chat/completions</strong> (Qwen2.5 Instruct, local). Not GPT‑4 quality — larger models + GPU sound more “human”.</p>

    <details class="mb-3 small" open>
      <summary class="fw-semibold">System instructions (optional)</summary>
      <label class="form-label mt-2 mb-1 text-muted">How the assistant should behave (code, language, brevity).</label>
      <textarea class="form-control form-control-sm" id="instr" rows="4">You are a helpful assistant. Reply in a natural, conversational tone. Be concise. If the user asks for code, give working code in a markdown block, then a brief explanation.</textarea>
    </details>

    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center py-2">
        <span class="small fw-semibold">Messages</span>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="btnClear">Clear</button>
      </div>
      <div class="card-body p-3" id="log"></div>
      <div class="card-footer">
        <form id="f" class="row g-2 align-items-end">
          <div class="col-12">
            <label class="form-label small mb-0">Message</label>
            <textarea class="form-control" id="input" rows="2" placeholder="Ask anything…" required></textarea>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small mb-0">Max tokens</label>
            <input type="number" class="form-control form-control-sm" id="maxTok" value="256" min="1" max="512">
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small mb-0">Temperature</label>
            <input type="number" class="form-control form-control-sm" id="temp" value="0.75" min="0.1" max="2" step="0.1">
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small mb-0">Repeat penalty</label>
            <input type="number" class="form-control form-control-sm" id="rep" value="1.08" min="1" max="2" step="0.05">
          </div>
          <div class="col-12 col-md-3 text-md-end">
            <button type="submit" class="btn btn-primary" id="btnSend">Send</button>
          </div>
        </form>
        <p class="text-danger small mt-2 mb-0 d-none" id="err"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
(function () {
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const err = document.getElementById('err');
  const btnSend = document.getElementById('btnSend');
  const f = document.getElementById('f');
  const messages = [];

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function appendBubble(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'mb-2 d-flex ' + (role === 'user' ? 'justify-content-end' : 'justify-content-start');
    const inner = document.createElement('div');
    inner.className = role === 'user' ? 'msg-user' : 'msg-bot';
    const meta = document.createElement('div');
    meta.className = 'msg-meta mb-1';
    meta.textContent = role === 'user' ? 'You' : 'Assistant';
    const body = document.createElement('div');
    body.className = role === 'user' ? 'text-break' : 'body';
    if (role === 'user') {
      body.innerHTML = esc(text).replace(/\n/g, '<br>');
    } else {
      body.textContent = text;
    }
    inner.appendChild(meta);
    inner.appendChild(body);
    wrap.appendChild(inner);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function buildApiMessages() {
    const out = [];
    const sys = (document.getElementById('instr') && document.getElementById('instr').value || '').trim();
    if (sys) out.push({ role: 'system', content: sys });
    messages.forEach(function (m) {
      out.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text });
    });
    return out;
  }

  document.getElementById('btnClear').addEventListener('click', function () {
    messages.length = 0;
    log.innerHTML = '';
    err.classList.add('d-none');
  });

  f.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.classList.add('d-none');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    messages.push({ role: 'user', text: text });
    appendBubble('user', text);

    btnSend.disabled = true;
    btnSend.textContent = '…';

    try {
      const res = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: buildApiMessages(),
          max_tokens: Math.min(512, Math.max(1, parseInt(document.getElementById('maxTok').value, 10) || 256)),
          temperature: parseFloat(document.getElementById('temp').value) || 0.75,
          top_p: 0.92,
          repetition_penalty: parseFloat(document.getElementById('rep').value) || 1.08
        })
      });
      const data = await res.json().catch(function () { return {}; });
      if (!res.ok) {
        throw new Error(data.detail ? JSON.stringify(data.detail) : (data.message || res.statusText));
      }
      const reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
      messages.push({ role: 'assistant', text: reply });
      appendBubble('assistant', reply || '(empty)');
    } catch (x) {
      err.textContent = String(x.message || x);
      err.classList.remove('d-none');
      messages.pop();
      if (log.lastChild) log.removeChild(log.lastChild);
    } finally {
      btnSend.disabled = false;
      btnSend.textContent = 'Send';
    }
  });
})();
  </script>
</body>
</html>
