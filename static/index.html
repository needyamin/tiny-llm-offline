<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Code assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1e1e1e; color: #d4d4d4; }
    .shell { max-width: 640px; margin: 0 auto; padding: 1rem; }
    .title { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .sub { font-size: 0.8rem; color: #888; }
    #log {
      height: min(58vh, 420px);
      overflow-y: auto;
      background: #252526;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .msg-user { background: #094771; color: #e0e0e0; border-radius: 8px; padding: 0.45rem 0.65rem; max-width: 95%; margin-left: auto; font-size: 0.9rem; }
    .msg-bot { background: #2d2d2d; color: #d4d4d4; border-radius: 8px; padding: 0.45rem 0.65rem; max-width: 95%; font-size: 0.85rem; }
    .msg-bot .body { white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, Consolas, monospace; }
    .msg-meta { font-size: 0.7rem; color: #888; margin-bottom: 0.2rem; }
    #loadingRow { color: #858585; font-size: 0.85rem; }
    textarea, input { background: #3c3c3c !important; border-color: #555 !important; color: #e0e0e0 !important; }
    .form-control:focus { box-shadow: none; border-color: #007acc !important; }
    details summary { cursor: pointer; color: #aaa; font-size: 0.8rem; }
    details { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <div>
        <div class="title">Code assistant</div>
        <div class="sub">PHP · Python · JavaScript · Java · local model</div>
      </div>
      <button type="button" class="btn btn-sm btn-outline-secondary py-0" id="btnClear">Clear</button>
    </div>

    <details>
      <summary>System prompt</summary>
      <textarea class="form-control form-control-sm mt-1" id="instr" rows="6">You are a senior developer assistant. Answer ONLY programming-related questions (code, debugging, APIs, algorithms, tools).

Focus languages: PHP, Python, JavaScript (browser & Node.js), and Java. If asked about another language, give a short answer or suggest how it maps to one of these.

Always:
- Use markdown code blocks with language tags (```php, ```python, ```javascript, ```java).
- Prefer minimal working examples; add 1–3 lines of explanation when helpful.
- Refuse unrelated small talk; reply with one line: "Ask a coding question (PHP/Python/JS/Java)."</textarea>
    </details>

    <div id="log"></div>

    <form id="f">
      <textarea class="form-control form-control-sm mb-2" id="input" rows="2" placeholder="Coding question… (e.g. PDO prepared statements, Python decorators)" required></textarea>
      <details class="mb-2">
        <summary>Advanced</summary>
        <div class="row g-2 mt-1">
          <div class="col-4">
            <input type="number" class="form-control form-control-sm" id="maxTok" value="384" min="1" max="512" title="Max tokens">
          </div>
          <div class="col-4">
            <input type="number" class="form-control form-control-sm" id="temp" value="0.65" min="0.1" max="2" step="0.05" title="Temperature">
          </div>
          <div class="col-4">
            <input type="number" class="form-control form-control-sm" id="rep" value="1.08" min="1" max="2" step="0.05" title="Repeat penalty">
          </div>
        </div>
      </details>
      <div class="d-flex gap-2 align-items-center">
        <button type="submit" class="btn btn-primary btn-sm flex-grow-1" id="btnSend">Send</button>
      </div>
      <p class="text-danger small mt-2 mb-0 d-none" id="err"></p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
(function () {
  const log = document.getElementById('log');
  const input = document.getElementById('input');
  const err = document.getElementById('err');
  const btnSend = document.getElementById('btnSend');
  const f = document.getElementById('f');
  const messages = [];
  var loadingEl = null;

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function showLoading() {
    hideLoading();
    loadingEl = document.createElement('div');
    loadingEl.id = 'loadingRow';
    loadingEl.className = 'd-flex align-items-center gap-2 py-2';
    loadingEl.innerHTML = '<div class="spinner-border spinner-border-sm text-info" role="status" aria-hidden="true"></div><span>Waiting for server…</span>';
    log.appendChild(loadingEl);
    log.scrollTop = log.scrollHeight;
  }

  function hideLoading() {
    if (loadingEl && loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
    loadingEl = null;
  }

  function appendBubble(role, text) {
    var wrap = document.createElement('div');
    wrap.className = 'mb-2 d-flex ' + (role === 'user' ? 'justify-content-end' : 'justify-content-start');
    var inner = document.createElement('div');
    inner.className = role === 'user' ? 'msg-user' : 'msg-bot';
    var meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = role === 'user' ? 'You' : 'Assistant';
    var body = document.createElement('div');
    body.className = role === 'user' ? '' : 'body';
    if (role === 'user') {
      body.innerHTML = esc(text).replace(/\n/g, '<br>');
    } else {
      body.textContent = text;
    }
    inner.appendChild(meta);
    inner.appendChild(body);
    wrap.appendChild(inner);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
  }

  function buildApiMessages() {
    var out = [];
    var sys = (document.getElementById('instr') && document.getElementById('instr').value || '').trim();
    if (sys) out.push({ role: 'system', content: sys });
    messages.forEach(function (m) {
      out.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text });
    });
    return out;
  }

  document.getElementById('btnClear').addEventListener('click', function () {
    messages.length = 0;
    log.innerHTML = '';
    err.classList.add('d-none');
    hideLoading();
  });

  f.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.classList.add('d-none');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    messages.push({ role: 'user', text: text });
    appendBubble('user', text);

    btnSend.disabled = true;
    showLoading();

    try {
      var res = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: buildApiMessages(),
          max_tokens: Math.min(512, Math.max(1, parseInt(document.getElementById('maxTok').value, 10) || 384)),
          temperature: parseFloat(document.getElementById('temp').value) || 0.65,
          top_p: 0.92,
          repetition_penalty: parseFloat(document.getElementById('rep').value) || 1.08
        })
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok) {
        throw new Error(data.detail ? JSON.stringify(data.detail) : (data.message || res.statusText));
      }
      var reply = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
      hideLoading();
      messages.push({ role: 'assistant', text: reply });
      appendBubble('assistant', reply || '(empty)');
    } catch (x) {
      hideLoading();
      err.textContent = String(x.message || x);
      err.classList.remove('d-none');
      messages.pop();
      if (log.lastChild) log.removeChild(log.lastChild);
    } finally {
      btnSend.disabled = false;
    }
  });
})();
  </script>
</body>
</html>
